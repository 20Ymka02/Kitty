 <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cute Cats World 🐾</title>
    <style>
        body {
            background-color: #fff0f5; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            color: #4a4a4a;
        }

        h1 {
            color: #ff69b4;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.1);
        }

        .button-container {
            margin-bottom: 30px;
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .cat-button {
            background-color: #ffb6c1;
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 1rem;
            font-weight: bold;
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        .cat-button:hover {
            background-color: #ff69b4;
            transform: translateY(-3px);
        }

        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(255, 182, 193, 0.8);
            backdrop-filter: blur(5px);
            align-items: center;
            justify-content: center;
        }

        .modal-content {
            background-color: white;
            padding: 20px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            position: relative;
            max-width: 90%;
            max-height: 80%;
            text-align: center;
        }

        .modal-content img {
            max-width: 100%;
            max-height: 60vh;
            border-radius: 10px;
            display: block;
        }

        .close-btn {
            position: absolute;
            top: 10px;
            right: 20px;
            font-size: 30px;
            color: #ff69b4;
            cursor: pointer;
            font-weight: bold;
        }

        footer {
            position: fixed;
            bottom: 20px;
            font-size: 0.9rem;
            color: #ff69b4;
        }
    </style>
</head>
<body>

    <h1>🐾 Cute Cat Gallery 🐾</h1>
    <p>Click a button to see a kitty!</p>

    <div class="button-container">
        <button class="cat-button" onclick="openModal(0)">Kitty1</button>
        <button class="cat-button" onclick="openModal(1)">Kitty2</button>
        <button class="cat-button" onclick="openModal(2)">Kitty3</button>
    </div>

    <div id="catModal" class="modal">
        <div class="modal-content">
            <span class="close-btn" onclick="closeModal()">&times;</span>
            <img id="modal-img" src="" alt="Cute Cat">
        </div>
    </div>

    <footer>
        Made with love ❤️
    </footer>

    <script>
        const catImages = [
            'https://cdn.pixabay.com/photo/2014/11/30/14/11/cat-551554_1280.jpg',
            'https://cdn.pixabay.com/photo/2017/02/20/18/03/cat-2083492_1280.jpg',
            'https://cdn.pixabay.com/photo/2015/03/27/13/16/cat-694730_1280.jpg'
        ];

        function openModal(index) {
            const modal = document.getElementById('catModal');
            const modalImg = document.getElementById('modal-img');
            modalImg.src = catImages[index];
            modal.style.display = 'flex';
        }

        function closeModal() {
            const modal = document.getElementById('catModal');
            modal.style.display = 'none';
        }

        window.onclick = function(event) {
            const modal = document.getElementById('catModal');
            if (event.target == modal) {
                closeModal();
            }
        }
    </script>

</body>
</html>
